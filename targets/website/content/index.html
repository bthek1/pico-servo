<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pico W</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2/dist/htmx.min.js"></script>
  <script src="https://unpkg.com/alpinejs@3/dist/cdn.min.js" defer></script>
  <style>
    @keyframes hpulse  { 0%,100%{opacity:1} 50%{opacity:.3}  }
    @keyframes ldpulse { 0%,100%{opacity:1} 50%{opacity:.15} }
    .animate-hpulse  { animation: hpulse  2s infinite; }
    .animate-ldpulse { animation: ldpulse .2s infinite; }
    input[type=range] { accent-color: #ef4444; cursor: pointer; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

<!-- Header -->
<header class="flex justify-between items-center px-5 py-2 bg-zinc-900 border-b border-zinc-800">
  <span class="font-semibold flex items-center gap-2">
    <span id="status-dot" class="animate-hpulse text-green-500">●</span>
    Pico W
  </span>
  <span id="ip-label" class="text-zinc-400 text-sm"></span>
</header>

<!-- Tabs -->
<div x-data="{ tab: 'terminal' }">

  <nav class="flex bg-zinc-900 border-b border-zinc-800 px-5">
    <button @click="tab='terminal'"
            :class="tab==='terminal' ? 'text-red-500 border-red-500' : 'text-zinc-400 border-transparent hover:text-zinc-100'"
            class="border-b-2 py-2.5 px-4 text-sm transition-colors bg-transparent">Terminal</button>
    <button @click="tab='light'"
            :class="tab==='light' ? 'text-red-500 border-red-500' : 'text-zinc-400 border-transparent hover:text-zinc-100'"
            class="border-b-2 py-2.5 px-4 text-sm transition-colors bg-transparent">Light</button>
    <button @click="tab='servo'"
            :class="tab==='servo' ? 'text-red-500 border-red-500' : 'text-zinc-400 border-transparent hover:text-zinc-100'"
            class="border-b-2 py-2.5 px-4 text-sm transition-colors bg-transparent">Servo</button>
  </nav>

  <main class="p-5">

    <!-- Terminal -->
    <section x-show="tab==='terminal'">
      <output id="term-out"
              class="block w-full h-[60vh] overflow-y-auto bg-zinc-900 border border-zinc-800 rounded p-2 font-mono text-sm text-zinc-200 whitespace-pre-wrap mb-3"
              hx-get="/recv.txt"
              hx-trigger="every 200ms"
              hx-swap="beforeend">
      </output>
      <form class="flex gap-2"
            x-data="{ msg: '' }"
            @submit.prevent="
              const out = document.getElementById('term-out');
              out.textContent += '> ' + msg + '\n';
              out.scrollTop = out.scrollHeight;
              fetch('/send?data=' + encodeURIComponent(msg));
              msg = ''">
        <input x-model="msg" type="text" placeholder="type and press Enter…" autocomplete="off"
               class="flex-1 bg-zinc-900 border border-zinc-800 rounded px-3 py-1.5 text-sm font-mono text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-zinc-600">
        <button type="submit"
                class="px-3 py-1.5 bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 rounded text-sm transition-colors">→</button>
      </form>
    </section>

    <!-- Light -->
    <section x-show="tab==='light'" x-data="ledPanel()" x-init="init()">
      <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-5 space-y-5">

        <div class="flex items-center gap-3">
          <span class="inline-block w-3.5 h-3.5 rounded-full transition-all"
                :class="{
                  'bg-zinc-700': mode === 'off',
                  'bg-green-500 shadow-[0_0_6px_#22c55e]': mode === 'on',
                  'bg-green-500 animate-ldpulse': mode === 'blink'
                }"
                :style="mode === 'blink' ? 'animation-duration:' + (ms * 2) + 'ms' : ''">
          </span>
          <span class="font-semibold" x-text="mode.toUpperCase()"></span>
        </div>

        <div>
          <div class="text-xs uppercase text-zinc-500 tracking-wide mb-2">Mode</div>
          <div class="flex gap-2">
            <button @click="set('on')"
                    :class="mode==='on'    ? 'bg-zinc-600 border-zinc-500 text-white' : 'bg-zinc-950 border-zinc-700 text-zinc-300 hover:bg-zinc-800'"
                    class="px-3 py-1.5 border rounded text-sm transition-colors">ON</button>
            <button @click="set('blink')"
                    :class="mode==='blink' ? 'bg-zinc-600 border-zinc-500 text-white' : 'bg-zinc-950 border-zinc-700 text-zinc-300 hover:bg-zinc-800'"
                    class="px-3 py-1.5 border rounded text-sm transition-colors">BLINK</button>
            <button @click="set('off')"
                    :class="mode==='off'   ? 'bg-zinc-600 border-zinc-500 text-white' : 'bg-zinc-950 border-zinc-700 text-zinc-300 hover:bg-zinc-800'"
                    class="px-3 py-1.5 border rounded text-sm transition-colors">OFF</button>
          </div>
        </div>

        <div>
          <div class="text-xs uppercase text-zinc-500 tracking-wide mb-2">
            Blink Speed —
            <span x-text="ms < 1000 ? ms + ' ms' : (ms / 1000).toFixed(1) + ' s'"></span>
          </div>
          <input type="range" min="50" max="5000" x-model.number="ms" class="w-full"
                 @change="if (mode === 'blink') send('/led?state=blink&ms=' + ms)">
        </div>

        <div>
          <div class="text-xs uppercase text-zinc-500 tracking-wide mb-2">Presets</div>
          <div class="flex gap-2 flex-wrap">
            <button @click="blinkPreset(50)"   class="px-3 py-1 bg-zinc-950 border border-zinc-700 rounded text-sm text-zinc-300 hover:bg-zinc-800 transition-colors">50 ms</button>
            <button @click="blinkPreset(100)"  class="px-3 py-1 bg-zinc-950 border border-zinc-700 rounded text-sm text-zinc-300 hover:bg-zinc-800 transition-colors">100 ms</button>
            <button @click="blinkPreset(250)"  class="px-3 py-1 bg-zinc-950 border border-zinc-700 rounded text-sm text-zinc-300 hover:bg-zinc-800 transition-colors">250 ms</button>
            <button @click="blinkPreset(500)"  class="px-3 py-1 bg-zinc-950 border border-zinc-700 rounded text-sm text-zinc-300 hover:bg-zinc-800 transition-colors">500 ms</button>
            <button @click="blinkPreset(1000)" class="px-3 py-1 bg-zinc-950 border border-zinc-700 rounded text-sm text-zinc-300 hover:bg-zinc-800 transition-colors">1 s</button>
          </div>
        </div>

      </div>
    </section>

    <!-- Servo -->
    <section x-show="tab==='servo'" x-data="servoPanel()" x-init="init()">
      <div class="bg-zinc-900 border border-zinc-800 rounded-lg p-5 space-y-5">

        <div>
          <div class="text-4xl font-bold text-red-500 text-center" x-text="pulse + ' µs'"></div>
          <div class="text-center text-zinc-400 mt-1" x-text="label()"></div>
        </div>

        <div>
          <div class="text-xs uppercase text-zinc-500 tracking-wide mb-2">Pulse Width</div>
          <input type="range" :min="range.min" :max="range.max" x-model.number="pulse" class="w-full"
                 @input="debounceSend('/servo?pulse=' + pulse)">
          <div class="flex justify-between text-xs text-zinc-600 mt-1">
            <span x-text="range.min + ' µs'"></span>
            <span x-text="range.max + ' µs'"></span>
          </div>
        </div>

        <div>
          <div class="text-xs uppercase text-zinc-500 tracking-wide mb-2">Mode</div>
          <div class="flex gap-2">
            <button @click="setMode('positional')"
                    :class="mode==='positional' ? 'bg-zinc-600 border-zinc-500 text-white' : 'bg-zinc-950 border-zinc-700 text-zinc-300 hover:bg-zinc-800'"
                    class="px-3 py-1.5 border rounded text-sm transition-colors">Positional</button>
            <button @click="setMode('continuous')"
                    :class="mode==='continuous' ? 'bg-zinc-600 border-zinc-500 text-white' : 'bg-zinc-950 border-zinc-700 text-zinc-300 hover:bg-zinc-800'"
                    class="px-3 py-1.5 border rounded text-sm transition-colors">Continuous</button>
          </div>
        </div>

        <div>
          <div class="text-xs uppercase text-zinc-500 tracking-wide mb-2">Range</div>
          <div class="flex gap-2 flex-wrap">
            <button @click="setRange('standard')"
                    :class="rangeKey==='standard' ? 'bg-zinc-600 border-zinc-500 text-white' : 'bg-zinc-950 border-zinc-700 text-zinc-300 hover:bg-zinc-800'"
                    class="px-3 py-1.5 border rounded text-sm transition-colors">Standard (1000–2000 µs)</button>
            <button @click="setRange('extended')"
                    :class="rangeKey==='extended' ? 'bg-amber-900/60 border-amber-600 text-amber-300' : 'bg-zinc-950 border-zinc-700 text-zinc-300 hover:bg-zinc-800'"
                    class="px-3 py-1.5 border rounded text-sm transition-colors">Extended (600–2400 µs) ⚠</button>
          </div>
          <div x-show="rangeKey === 'extended'"
               class="mt-2 px-3 py-2 bg-amber-950/50 border border-amber-800 rounded text-amber-300 text-sm">
            ⚠ Extended range may damage servo gears. Avoid sustained use at limits.
          </div>
        </div>

        <div x-show="mode === 'continuous'">
          <div class="text-xs uppercase text-zinc-500 tracking-wide mb-2">
            Stop Trim — <span x-text="(trim >= 0 ? '+' : '') + trim + ' µs'"></span>
          </div>
          <input type="range" min="-50" max="50" x-model.number="trim" class="w-full"
                 @change="send('/servo?trim=' + trim)">
        </div>

        <button @click="action()" class="w-full py-2.5 rounded font-semibold text-sm transition-colors"
                :class="mode === 'continuous'
                  ? 'bg-red-700 hover:bg-red-600 border border-red-600 text-white'
                  : 'bg-green-900 hover:bg-green-800 border border-green-700 text-green-300'"
                x-text="mode === 'continuous' ? '■ STOP' : 'Centre (1500 µs)'">
        </button>

      </div>
    </section>

  </main>
</div>

<script>
  document.getElementById('ip-label').textContent = location.hostname;

  document.body.addEventListener('htmx:responseError', () => {
    const dot = document.getElementById('status-dot');
    dot.classList.remove('text-green-500', 'animate-hpulse');
    dot.classList.add('text-red-500');
  });
  document.body.addEventListener('htmx:afterRequest', e => {
    if (e.detail.successful) {
      const dot = document.getElementById('status-dot');
      dot.classList.remove('text-red-500');
      dot.classList.add('text-green-500', 'animate-hpulse');
    }
  });
  document.body.addEventListener('htmx:afterSwap', e => {
    if (e.target && e.target.id === 'term-out')
      e.target.scrollTop = e.target.scrollHeight;
  });

  function send(url) {
    fetch(url).catch(() => {
      const dot = document.getElementById('status-dot');
      dot.classList.remove('text-green-500', 'animate-hpulse');
      dot.classList.add('text-red-500');
    });
  }

  // ── LED panel ──────────────────────────────────────────────────────────────
  function ledPanel() {
    return {
      mode: 'off',
      ms: 100,
      init() {},
      set(m) {
        this.mode = m;
        let url = '/led?state=' + m;
        if (m === 'blink') url += '&ms=' + this.ms;
        send(url);
      },
      blinkPreset(ms) {
        this.ms = ms;
        this.set('blink');
      },
    };
  }

  // ── Servo panel ────────────────────────────────────────────────────────────
  function servoPanel() {
    return {
      mode: 'positional',
      pulse: 1500,
      trim: 0,
      rangeKey: 'standard',
      ranges: {
        standard: { min: 1000, max: 2000 },
        extended: { min: 600,  max: 2400 },
      },
      get range() { return this.ranges[this.rangeKey]; },
      _timer: null,

      init() {
        fetch('/servo_info.txt')
          .then(r => r.text())
          .then(t => {
            const p = Object.fromEntries(
              t.trim().split('\n').map(l => l.split('=').map(s => s.trim()))
            );
            this.mode = p.type || 'positional';
            send('/servo?pulse=1500');
          })
          .catch(() => {});
        window.addEventListener('beforeunload', () => {
          if (this.mode === 'continuous') navigator.sendBeacon('/servo?stop');
        });
      },

      send(url) { send(url); },
      debounceSend(url) {
        clearTimeout(this._timer);
        this._timer = setTimeout(() => send(url), 100);
      },

      setMode(m) { this.mode = m; },
      setRange(k) {
        this.rangeKey = k;
        const r = this.ranges[k];
        this.pulse = Math.max(r.min, Math.min(r.max, this.pulse));
      },
      action() {
        this.pulse = 1500;
        send(this.mode === 'continuous' ? '/servo?stop' : '/servo?pulse=1500');
      },

      label() {
        const r = this.range;
        if (this.mode === 'continuous') {
          if (Math.abs(this.pulse - 1500) < 5) return 'STOP';
          const pct = this.pulse > 1500
            ? Math.round((this.pulse - 1500) / (r.max - 1500) * 100)
            : Math.round((1500 - this.pulse) / (1500 - r.min) * 100);
          return (this.pulse > 1500 ? 'FWD ' : 'REV ') + pct + '%';
        }
        const deg = Math.round((this.pulse - r.min) / (r.max - r.min) * 180);
        return '≈ ' + Math.max(0, Math.min(180, deg)) + '°';
      },
    };
  }
</script>

</body>
</html>
