<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pico W</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://unpkg.com/htmx.org@2/dist/htmx.min.js"></script>
  <script src="https://unpkg.com/alpinejs@3/dist/cdn.min.js" defer></script>
  <style>
    body { padding: 0; }

    header {
      padding: .6rem 1.25rem;
      border-bottom: 1px solid var(--pico-muted-border-color);
      display: flex; align-items: center; justify-content: space-between;
    }
    .brand { font-weight: 600; display: flex; align-items: center; gap: .5rem; }
    @keyframes hpulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    #status-dot { animation: hpulse 2s infinite; color: var(--pico-color-green-500); }
    #status-dot.error { animation: none; color: var(--pico-color-red-500); }
    .meta { color: var(--pico-muted-color); font-size: .85rem; }

    nav.tabs { padding: 0 1.25rem; border-bottom: 1px solid var(--pico-muted-border-color); }
    nav.tabs ul { margin: 0; padding: 0; display: flex; list-style: none; gap: .25rem; }
    nav.tabs button {
      background: none; border: none;
      border-bottom: 2px solid transparent;
      color: var(--pico-muted-color);
      cursor: pointer; padding: .65rem 1rem; font-size: .9rem;
      transition: color .15s, border-color .15s;
    }
    nav.tabs button:hover { color: var(--pico-color); }
    nav.tabs button[aria-current] {
      color: var(--pico-primary);
      border-bottom-color: var(--pico-primary);
    }

    main { padding: 1.25rem; }

    /* Terminal */
    #term-out {
      display: block; width: 100%;
      height: 60vh; overflow-y: auto;
      background: var(--pico-card-background-color);
      border: 1px solid var(--pico-muted-border-color);
      border-radius: var(--pico-border-radius);
      padding: .6rem; margin-bottom: .75rem;
      font-family: monospace; font-size: .85rem;
      white-space: pre-wrap;
    }
    #term-form { display: flex; gap: .5rem; margin: 0; }
    #term-form input  { flex: 1; margin: 0; }
    #term-form button { width: auto; margin: 0; }

    /* LED dot */
    .led-dot {
      display: inline-block; width: 14px; height: 14px;
      border-radius: 50%; background: var(--pico-muted-border-color);
      vertical-align: middle; transition: background .3s;
    }
    .led-dot[data-state="on"] {
      background: var(--pico-color-green-500);
      box-shadow: 0 0 6px var(--pico-color-green-500);
    }
    @keyframes ldpulse { 0%,100%{opacity:1} 50%{opacity:.15} }
    .led-dot[data-state="blink"] {
      background: var(--pico-color-green-500);
      animation: ldpulse .2s infinite;
    }

    /* Servo */
    .pulse-display {
      font-size: 2.5rem; font-weight: 700;
      color: var(--pico-primary); text-align: center;
    }
    .pulse-sub {
      text-align: center; color: var(--pico-muted-color);
      margin-top: -.5rem; margin-bottom: .75rem;
    }
    .range-warning {
      display: none; padding: .5rem .75rem; margin-top: .5rem;
      background: color-mix(in srgb, var(--pico-color-amber-500) 10%, transparent);
      border: 1px solid var(--pico-color-amber-500);
      border-radius: var(--pico-border-radius);
      font-size: .85rem; color: var(--pico-color-amber-300);
    }
    .range-warning.visible { display: block; }
  </style>
</head>
<body>

<header>
  <span class="brand">
    <span id="status-dot">●</span>
    Pico W
  </span>
  <span id="ip-label" class="meta"></span>
</header>

<div x-data="{ tab: 'terminal' }">

  <nav class="tabs">
    <ul>
      <li><button @click="tab='terminal'" :aria-current="tab==='terminal' || undefined">Terminal</button></li>
      <li><button @click="tab='light'"    :aria-current="tab==='light'    || undefined">Light</button></li>
      <li><button @click="tab='servo'"    :aria-current="tab==='servo'    || undefined">Servo</button></li>
    </ul>
  </nav>

  <main>

    <!-- Terminal -->
    <section x-show="tab==='terminal'">
      <output id="term-out"
              hx-get="/recv.txt"
              hx-trigger="every 200ms"
              hx-swap="beforeend"
      ></output>
      <form id="term-form"
            x-data="{ msg: '' }"
            @submit.prevent="
              const out = document.getElementById('term-out');
              out.textContent += '> ' + msg + '\n';
              out.scrollTop = out.scrollHeight;
              fetch('/send?data=' + encodeURIComponent(msg));
              msg = ''">
        <input x-model="msg" type="text" placeholder="type and press Enter…" autocomplete="off">
        <button type="submit">→</button>
      </form>
    </section>

    <!-- Light -->
    <section x-show="tab==='light'" x-data="ledPanel()" x-init="init()">
      <article>
        <header style="display:flex; align-items:center; gap:.75rem; margin-bottom:1rem">
          <span class="led-dot" :data-state="mode"></span>
          <strong x-text="mode.toUpperCase()"></strong>
        </header>

        <div style="display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1rem">
          <button @click="set('on')"    :aria-pressed="mode==='on'"    class="secondary">ON</button>
          <button @click="set('blink')" :aria-pressed="mode==='blink'" class="secondary">BLINK</button>
          <button @click="set('off')"   :aria-pressed="mode==='off'"   class="secondary">OFF</button>
        </div>

        <label>
          Blink speed —
          <span x-text="ms < 1000 ? ms + ' ms' : (ms / 1000).toFixed(1) + ' s'"></span>
          <input type="range" min="50" max="5000" x-model.number="ms"
                 @change="if (mode === 'blink') send('/led?state=blink&ms=' + ms)">
        </label>

        <div style="display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.5rem">
          <button class="outline secondary" @click="blinkPreset(50)">50 ms</button>
          <button class="outline secondary" @click="blinkPreset(100)">100 ms</button>
          <button class="outline secondary" @click="blinkPreset(250)">250 ms</button>
          <button class="outline secondary" @click="blinkPreset(500)">500 ms</button>
          <button class="outline secondary" @click="blinkPreset(1000)">1 s</button>
        </div>
      </article>
    </section>

    <!-- Servo -->
    <section x-show="tab==='servo'" x-data="servoPanel()" x-init="init()">
      <article>
        <div class="pulse-display" x-text="pulse + ' µs'"></div>
        <div class="pulse-sub"     x-text="label()"></div>

        <label>
          Pulse width
          <input type="range" :min="range.min" :max="range.max" x-model.number="pulse"
                 @input="debounceSend('/servo?pulse=' + pulse)">
        </label>

        <div style="display:flex; gap:.5rem; margin-bottom:1rem">
          <button @click="setMode('positional')" :aria-pressed="mode==='positional'" class="secondary">Positional</button>
          <button @click="setMode('continuous')"  :aria-pressed="mode==='continuous'"  class="secondary">Continuous</button>
        </div>

        <div style="display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:.25rem">
          <button @click="setRange('standard')" :aria-pressed="rangeKey==='standard'" class="outline secondary">Standard (1000–2000 µs)</button>
          <button @click="setRange('extended')" :aria-pressed="rangeKey==='extended'" class="outline secondary">Extended (600–2400 µs) ⚠</button>
        </div>
        <div class="range-warning" :class="{ visible: rangeKey === 'extended' }">
          ⚠ Extended range may damage servo gears. Avoid sustained use at limits.
        </div>

        <template x-if="mode === 'continuous'">
          <label style="margin-top:.75rem">
            Stop trim —
            <span x-text="(trim >= 0 ? '+' : '') + trim + ' µs'"></span>
            <input type="range" min="-50" max="50" x-model.number="trim"
                   @change="send('/servo?trim=' + trim)">
          </label>
        </template>

        <button @click="action()" style="width:100%; margin-top:.75rem"
                :style="mode==='continuous'
                  ? 'background:var(--pico-color-red-600); border-color:var(--pico-color-red-600)'
                  : 'background:var(--pico-color-green-800); border-color:var(--pico-color-green-500); color:var(--pico-color-green-300)'"
                x-text="mode === 'continuous' ? '■ STOP' : 'Centre (1500 µs)'">
        </button>
      </article>
    </section>

  </main>
</div>

<script>
  document.getElementById('ip-label').textContent = location.hostname;

  // htmx connectivity indicator
  document.body.addEventListener('htmx:responseError', () => {
    document.getElementById('status-dot').classList.add('error');
  });
  document.body.addEventListener('htmx:afterRequest', e => {
    if (e.detail.successful) document.getElementById('status-dot').classList.remove('error');
  });
  // auto-scroll terminal on new content
  document.body.addEventListener('htmx:afterSwap', e => {
    if (e.target && e.target.id === 'term-out')
      e.target.scrollTop = e.target.scrollHeight;
  });

  function send(url) {
    fetch(url).catch(() => document.getElementById('status-dot').classList.add('error'));
  }

  // ── LED panel ──────────────────────────────────────────────────────────────
  function ledPanel() {
    return {
      mode: 'off',
      ms: 100,
      init() {},
      set(m) {
        this.mode = m;
        let url = '/led?state=' + m;
        if (m === 'blink') url += '&ms=' + this.ms;
        send(url);
      },
      blinkPreset(ms) {
        this.ms = ms;
        this.set('blink');
      },
    };
  }

  // ── Servo panel ────────────────────────────────────────────────────────────
  function servoPanel() {
    return {
      mode: 'positional',
      pulse: 1500,
      trim: 0,
      rangeKey: 'standard',
      ranges: {
        standard: { min: 1000, max: 2000 },
        extended: { min: 600,  max: 2400 },
      },
      get range() { return this.ranges[this.rangeKey]; },
      _timer: null,

      init() {
        fetch('/servo_info.txt')
          .then(r => r.text())
          .then(t => {
            const p = Object.fromEntries(
              t.trim().split('\n').map(l => l.split('=').map(s => s.trim()))
            );
            this.mode = p.type || 'positional';
            send('/servo?pulse=1500');
          })
          .catch(() => {});
        window.addEventListener('beforeunload', () => {
          if (this.mode === 'continuous') navigator.sendBeacon('/servo?stop');
        });
      },

      send(url)       { send(url); },
      debounceSend(url) {
        clearTimeout(this._timer);
        this._timer = setTimeout(() => send(url), 100);
      },

      setMode(m) { this.mode = m; },
      setRange(k) {
        this.rangeKey = k;
        const r = this.ranges[k];
        this.pulse = Math.max(r.min, Math.min(r.max, this.pulse));
      },
      action() {
        this.pulse = 1500;
        send(this.mode === 'continuous' ? '/servo?stop' : '/servo?pulse=1500');
      },

      label() {
        const r = this.range;
        if (this.mode === 'continuous') {
          if (Math.abs(this.pulse - 1500) < 5) return 'STOP';
          const pct = this.pulse > 1500
            ? Math.round((this.pulse - 1500) / (r.max - 1500) * 100)
            : Math.round((1500 - this.pulse) / (1500 - r.min) * 100);
          return (this.pulse > 1500 ? 'FWD ' : 'REV ') + pct + '%';
        }
        const deg = Math.round((this.pulse - r.min) / (r.max - r.min) * 180);
        return '≈ ' + Math.max(0, Math.min(180, deg)) + '°';
      },
    };
  }
</script>

</body>
</html>
