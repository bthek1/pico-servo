<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pico W Control Panel</title>
  <style>
    :root {
      --bg: #0d0d0d; --surface: #1a1a1a; --border: #2a2a2a;
      --accent: #e53935; --text: #e0e0e0; --text-muted: #666;
      --green: #43a047; --mono: 'Courier New', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif;
           font-size: 14px; display: flex; flex-direction: column; height: 100vh; }

    header { display: flex; justify-content: space-between; align-items: center;
             padding: .6rem 1.25rem; background: var(--surface); border-bottom: 1px solid var(--border); }
    .brand { display: flex; align-items: center; gap: .5rem; font-weight: 600; }
    @keyframes hpulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    #dot { color: var(--green); animation: hpulse 2s infinite; }
    #dot.error { color: var(--accent); animation: none; }
    .meta { color: var(--text-muted); font-size: .82rem; }

    nav { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.25rem; }
    .tab { background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-muted);
           cursor: pointer; font-size: .9rem; padding: .65rem 1rem; transition: color .15s, border-color .15s; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    main { flex: 1; overflow: hidden; padding: 1.25rem; }
    .panel { display: none; height: 100%; }
    .panel.visible { display: flex; flex-direction: column; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 1.25rem; }

    /* Terminal */
    #panel-terminal { gap: .75rem; }
    #output { flex: 1; background: #111; border: 1px solid var(--border); border-radius: 4px;
              padding: .6rem; overflow-y: auto; white-space: pre-wrap;
              font-family: var(--mono); font-size: .82rem; color: #ccc; }
    #input-row { display: flex; gap: .5rem; }
    #tinput { flex: 1; background: #111; color: var(--text); border: 1px solid var(--border);
              border-radius: 4px; padding: .4rem .6rem; font-family: var(--mono); font-size: .85rem; }
    #tinput:focus { outline: none; border-color: #444; }

    /* Shared buttons */
    .btn { padding: .45rem .9rem; border: 1px solid var(--border); border-radius: 4px;
           background: var(--surface); color: var(--text); cursor: pointer; font-size: .85rem;
           transition: background .15s, border-color .15s; }
    .btn:hover { background: #222; border-color: #444; }
    .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Light panel */
    .light-card { display: flex; flex-direction: column; gap: 1rem; }
    .section-label { color: var(--text-muted); font-size: .78rem; text-transform: uppercase;
                     letter-spacing: .05em; margin-bottom: .35rem; }
    .led-indicator { display: flex; align-items: center; justify-content: center; gap: .75rem; padding: .6rem 0; }
    .led-dot { width: 16px; height: 16px; border-radius: 50%; background: #444; transition: background .3s; }
    .led-dot.on    { background: var(--green); box-shadow: 0 0 8px var(--green); }
    @keyframes ldpulse { 0%,100%{opacity:1} 50%{opacity:.2} }
    .led-dot.blink { background: var(--green); animation: ldpulse .2s infinite; }
    .led-label { font-size: .95rem; font-weight: 600; }
    .btn-group { display: flex; gap: .5rem; }
    .presets { display: flex; gap: .5rem; flex-wrap: wrap; }

    .slider-wrap { display: flex; flex-direction: column; gap: .4rem; }
    .slider-row  { display: flex; align-items: center; gap: .5rem; }
    .slider-row span { color: var(--text-muted); font-size: .78rem; white-space: nowrap; }
    input[type=range] { flex: 1; accent-color: var(--accent); cursor: pointer; }
    .slider-val { text-align: center; color: var(--text-muted); font-size: .85rem; }

    /* Servo panel */
    .servo-card { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
    .arc-wrap { display: flex; justify-content: center; }
    .deg-display { font-size: 2.5rem; font-weight: 700; color: var(--accent); text-align: center; }
    .servo-controls { width: 100%; display: flex; flex-direction: column; gap: .75rem; }

    /* Continuous servo */
    .btn-stop { background: var(--accent); border-color: var(--accent); color: #fff;
                font-size: 1.1rem; font-weight: 700; padding: .65rem 2rem; width: 100%; }
    .btn-stop:hover { background: #c62828; border-color: #c62828; }
  </style>
</head>
<body>
  <header>
    <span class="brand"><span id="dot">●</span> Pico W Control Panel</span>
    <span class="meta"><span id="ip"></span>&nbsp;&nbsp;↑&nbsp;<span id="uptime">0 s</span></span>
  </header>

  <nav>
    <button class="tab active" data-tab="terminal" onclick="showTab(this)">Terminal</button>
    <button class="tab"        data-tab="light"    onclick="showTab(this)">Light</button>
    <button class="tab"        data-tab="servo"    onclick="showTab(this)">Servo</button>
  </nav>

  <main>
    <!-- Terminal -->
    <div id="panel-terminal" class="panel card visible">
      <div id="output"></div>
      <div id="input-row">
        <input id="tinput" type="text" placeholder="type and press Enter…" autocomplete="off">
        <button class="btn active" onclick="send()">→</button>
      </div>
    </div>

    <!-- Light -->
    <div id="panel-light" class="panel card">
      <div class="light-card">
        <div>
          <div class="section-label">LED Status</div>
          <div class="led-indicator">
            <div id="led-dot" class="led-dot"></div>
            <span id="led-label" class="led-label" style="color:var(--text-muted)">OFF</span>
          </div>
        </div>
        <div>
          <div class="section-label">Mode</div>
          <div class="btn-group">
            <button class="btn" id="btn-on"    onclick="setLed('on')">ON</button>
            <button class="btn" id="btn-blink" onclick="setLed('blink')">BLINK</button>
            <button class="btn active" id="btn-off" onclick="setLed('off')">OFF</button>
          </div>
        </div>
        <div>
          <div class="section-label">Blink Speed</div>
          <div class="slider-wrap">
            <div class="slider-row">
              <span>50ms</span>
              <input id="blink-slider" type="range" min="50" max="5000" value="100"
                     onchange="onBlinkChange(this.value)">
              <span>5s</span>
            </div>
            <div id="blink-val" class="slider-val">100 ms</div>
          </div>
        </div>
        <div>
          <div class="section-label">Presets</div>
          <div class="presets">
            <button class="btn" onclick="blinkPreset(50)">50ms</button>
            <button class="btn" onclick="blinkPreset(100)">100ms</button>
            <button class="btn" onclick="blinkPreset(250)">250ms</button>
            <button class="btn" onclick="blinkPreset(500)">500ms</button>
            <button class="btn" onclick="blinkPreset(1000)">1s</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Servo (populated dynamically after fetching /servo_info.txt) -->
    <div id="panel-servo" class="panel card">
      <div id="servo-card" class="servo-card">
        <div style="color:var(--text-muted)">Loading…</div>
      </div>
    </div>
  </main>

  <script>
    const state = { ledMode: 'off', blinkMs: 100, errorCount: 0 };
    let servoType = 'positional';
    let servoBusy = false;
    let srvTimer  = null;

    document.getElementById('ip').textContent = location.hostname;

    // --- Uptime counter ---
    let uptimeSec = 0;
    setInterval(() => {
      uptimeSec++;
      const u = uptimeSec;
      document.getElementById('uptime').textContent =
        u < 60 ? u + ' s' : u < 3600 ? Math.floor(u/60) + ' m' : Math.floor(u/3600) + ' h';
    }, 1000);

    // --- Tab switching ---
    function showTab(btn) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('visible'));
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.tab).classList.add('visible');
    }

    // --- General fetch wrapper ---
    function cmd(url) {
      fetch(url)
        .then(() => { state.errorCount = 0; document.getElementById('dot').className = ''; })
        .catch(() => { state.errorCount++; if (state.errorCount >= 3) document.getElementById('dot').className = 'error'; });
    }

    // --- Servo fetch wrapper (in-flight guard) ---
    function servoCmd(url) {
      if (servoBusy) return;
      servoBusy = true;
      fetch(url)
        .then(() => { state.errorCount = 0; document.getElementById('dot').className = ''; })
        .catch(() => { state.errorCount++; if (state.errorCount >= 3) document.getElementById('dot').className = 'error'; })
        .finally(() => { servoBusy = false; });
    }

    // --- Servo UI builder ---
    function buildServoUI(text) {
      const p = {};
      text.trim().split('\n').forEach(l => { const [k,v]=l.split('='); if(k) p[k.trim()]=(v||'').trim(); });
      servoType = p.type || 'positional';
      const card = document.getElementById('servo-card');

      if (servoType === 'continuous') {
        const initTrim = parseInt(p.stop || '1500') - 1500;
        card.innerHTML =
          '<div id="speed-display" class="deg-display">STOP</div>' +
          '<div class="servo-controls">' +
            '<div class="slider-wrap">' +
              '<div class="slider-row">' +
                '<span>REV</span>' +
                '<input id="speed-slider" type="range" min="-100" max="100" value="0"' +
                '       oninput="onSpeedSlider(this.value)">' +
                '<span>FWD</span>' +
              '</div>' +
              '<div id="speed-val" class="slider-val">0%</div>' +
            '</div>' +
            '<button class="btn btn-stop" onclick="stopServo()">&#9632; STOP</button>' +
            '<div>' +
              '<div class="section-label">Stop Trim (&micro;s)</div>' +
              '<div class="slider-wrap">' +
                '<div class="slider-row">' +
                  '<span>&minus;50</span>' +
                  '<input id="trim-slider" type="range" min="-50" max="50" value="' + initTrim + '"' +
                  '       onchange="onTrimChange(this.value)">' +
                  '<span>+50</span>' +
                '</div>' +
                '<div id="trim-val" class="slider-val">' + (initTrim >= 0 ? '+' : '') + initTrim + ' µs</div>' +
              '</div>' +
            '</div>' +
          '</div>';
        servoCmd('/servo?stop');
      } else {
        card.innerHTML =
          '<div class="arc-wrap">' +
            '<svg viewBox="0 0 200 110" width="200" height="110">' +
              '<path d="M10,100 A90,90 0 0,1 190,100"' +
              '      fill="none" stroke="#2a2a2a" stroke-width="6" stroke-linecap="round"/>' +
              '<line id="needle" x1="100" y1="100" x2="100" y2="15"' +
              '      stroke="#e53935" stroke-width="3" stroke-linecap="round"' +
              '      transform="rotate(-90, 100, 100)"/>' +
              '<circle cx="100" cy="100" r="5" fill="#e53935"/>' +
            '</svg>' +
          '</div>' +
          '<div id="deg-display" class="deg-display">90&deg;</div>' +
          '<div class="servo-controls">' +
            '<div class="slider-wrap">' +
              '<div class="slider-row">' +
                '<span>0&deg;</span>' +
                '<input id="servo-slider" type="range" min="0" max="180" value="90"' +
                '       oninput="onServoSlider(this.value)">' +
                '<span>180&deg;</span>' +
              '</div>' +
            '</div>' +
            '<div>' +
              '<div class="section-label">Presets</div>' +
              '<div class="presets">' +
                '<button class="btn" onclick="setServo(0)">0&deg;</button>' +
                '<button class="btn" onclick="setServo(45)">45&deg;</button>' +
                '<button class="btn" onclick="setServo(90)">Centre</button>' +
                '<button class="btn" onclick="setServo(135)">135&deg;</button>' +
                '<button class="btn" onclick="setServo(180)">180&deg;</button>' +
              '</div>' +
            '</div>' +
          '</div>';
        setServo(90);
      }
    }

    fetch('/servo_info.txt')
      .then(r => r.text()).then(buildServoUI)
      .catch(() => buildServoUI('type=positional\n'));

    window.addEventListener('beforeunload', () => {
      if (servoType === 'continuous') navigator.sendBeacon('/servo?stop');
    });

    // --- Terminal ---
    const out = document.getElementById('output');
    const inp = document.getElementById('tinput');

    function append(text) { out.textContent += text; out.scrollTop = out.scrollHeight; }
    function send() {
      const text = inp.value.trim();
      if (!text) return;
      inp.value = '';
      append('> ' + text + '\n');
      fetch('/send?data=' + encodeURIComponent(text)).catch(() => append('[send failed]\n'));
    }
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

    setInterval(() => {
      fetch('/recv.txt').then(r => r.text()).then(t => {
        if (t) append(t);
        state.errorCount = 0;
        document.getElementById('dot').className = '';
      }).catch(() => {
        state.errorCount++;
        if (state.errorCount >= 3) document.getElementById('dot').className = 'error';
      });
    }, 200);

    // --- LED ---
    function setLed(mode, ms) {
      state.ledMode = mode;
      if (ms !== undefined) state.blinkMs = ms;
      const dot = document.getElementById('led-dot');
      const lbl = document.getElementById('led-label');
      dot.className = 'led-dot' + (mode === 'on' ? ' on' : mode === 'blink' ? ' blink' : '');
      if (mode === 'blink') dot.style.animationDuration = (state.blinkMs * 2) + 'ms';
      lbl.textContent = mode.toUpperCase();
      lbl.style.color = mode === 'off' ? 'var(--text-muted)' : 'var(--text)';
      ['on','blink','off'].forEach(m =>
        document.getElementById('btn-' + m).classList.toggle('active', m === mode));
      let url = '/led?state=' + mode;
      if (mode === 'blink') url += '&ms=' + state.blinkMs;
      cmd(url);
    }

    function onBlinkChange(val) {
      val = parseInt(val);
      state.blinkMs = val;
      document.getElementById('blink-val').textContent =
        val < 1000 ? val + ' ms' : (val / 1000).toFixed(1) + ' s';
      if (state.ledMode === 'blink') {
        document.getElementById('led-dot').style.animationDuration = (val * 2) + 'ms';
        cmd('/led?state=blink&ms=' + val);
      }
    }

    function blinkPreset(ms) {
      document.getElementById('blink-slider').value = ms;
      onBlinkChange(ms);
      setLed('blink', ms);
    }

    // --- Positional servo ---
    function setServo(deg) {
      deg = Math.round(deg);
      const sl = document.getElementById('servo-slider');
      if (sl) sl.value = deg;
      const dd = document.getElementById('deg-display');
      if (dd) dd.textContent = deg + '°';
      const needle = document.getElementById('needle');
      if (needle) needle.setAttribute('transform', 'rotate(' + (deg - 90) + ', 100, 100)');
      servoCmd('/servo?deg=' + deg);
    }

    function onServoSlider(val) {
      val = parseInt(val);
      const dd = document.getElementById('deg-display');
      if (dd) dd.textContent = val + '°';
      const needle = document.getElementById('needle');
      if (needle) needle.setAttribute('transform', 'rotate(' + (val - 90) + ', 100, 100)');
      clearTimeout(srvTimer);
      srvTimer = setTimeout(() => servoCmd('/servo?deg=' + val), 100);
    }

    // --- Continuous servo ---
    function stopServo() {
      const sl = document.getElementById('speed-slider');
      if (sl) sl.value = 0;
      const sd = document.getElementById('speed-display');
      if (sd) sd.textContent = 'STOP';
      const sv = document.getElementById('speed-val');
      if (sv) sv.textContent = '0%';
      servoCmd('/servo?stop');
    }

    function onSpeedSlider(val) {
      val = parseInt(val);
      const sd = document.getElementById('speed-display');
      const sv = document.getElementById('speed-val');
      if (val === 0) {
        if (sd) sd.textContent = 'STOP';
        if (sv) sv.textContent = '0%';
      } else {
        const dir = val > 0 ? 'FWD' : 'REV';
        const pct = Math.abs(val);
        if (sd) sd.textContent = dir + ' ' + pct + '%';
        if (sv) sv.textContent = (val > 0 ? '+' : '') + val + '%';
      }
      clearTimeout(srvTimer);
      srvTimer = setTimeout(() => {
        if (val === 0) servoCmd('/servo?stop');
        else servoCmd('/servo?speed=' + val);
      }, 100);
    }

    function onTrimChange(val) {
      val = parseInt(val);
      const tv = document.getElementById('trim-val');
      if (tv) tv.textContent = (val >= 0 ? '+' : '') + val + ' µs';
      servoCmd('/servo?trim=' + val);
    }
  </script>
</body>
</html>
